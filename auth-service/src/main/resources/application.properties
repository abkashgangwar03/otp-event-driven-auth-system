spring.application.name=auth-service

# ---------------- Service Discovery (Eureka) ----------------
eureka.client.service-url.defaultZone=http://eureka:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

server.port=8081

# MySQL
spring.datasource.url=jdbc:mysql://mysql:3306/otpdb
spring.datasource.username=root
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.connection-timeout=30000
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect



# Redis Docker
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.timeout=6000
spring.data.redis.connect-timeout=6000

# Redis connection pool
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5


# Kafka
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.retries=10
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.producer.delivery-timeout-ms=120000
spring.kafka.producer.request-timeout-ms=30000
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5

# Kafka batching for better throughput
spring.kafka.producer.linger-ms=5
spring.kafka.producer.batch-size=16384

# Resilience4j
resilience4j.circuitbreaker.instances.redisService.sliding-window-size=10
resilience4j.circuitbreaker.instances.redisService.failure-rate-threshold=50
resilience4j.retry.instances.kafkaRetry.max-attempts=3
resilience4j.retry.instances.kafkaRetry.wait-duration=500ms

# Logging with correlation id propagated from gateway
logging.pattern.level=%5p [${spring.application.name:},%X{X-Correlation-Id}]